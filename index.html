<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตารางแข่งขันแบดมินตัน</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#eef1f6;
  margin:0;
}
.header{
  background:#1f2d3d;
  color:white;
  padding:18px;
  font-size:20px;
  text-align:center;
}
.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}
.card{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
select{
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ddd;
}
.match{
  background:#f6f8fb;
  padding:12px;
  border-radius:8px;
  margin-top:10px;
}
.calendar-day{
  padding:10px;
  border-radius:8px;
  background:#f1f3f7;
  margin-top:8px;
  cursor:pointer;
}
.calendar-day:hover{
  background:#e1e5ec;
}
.loading{
  text-align:center;
  color:#777;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
🏸 ตารางแข่งขันแบดมินตัน
</div>

<div class="container">

<div class="card">
<label>เลือกผู้เล่น</label>
<select id="playerSelect"></select>
</div>

<div class="card">
<h3>แมตช์ของผู้เล่น</h3>
<div id="playerMatches"></div>
</div>

<div class="card">
<h3>📅 ปฏิทินการแข่งขัน</h3>
<div id="calendar"></div>
</div>

<div class="card">
<h3 id="dailyTitle">🏸 แมตช์ของวัน</h3>
<div id="dailyMatches"></div>
</div>

</div>

<script>

/* ============================= */
/* ใส่ URL CSV จาก Google Sheet */
/* ============================= */

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRmxdIT4TtMFV6BofYhg2qrVYktbtl0DlMXVSEth4y03mHlaDSIp5WLZBaP9BcLkSyBsOhoQycT3itS/pub?output=csv"


/* DATA */

let matches=[]

let bluePlayers=new Set()
let redPlayers=new Set()


/* โหลดข้อมูลจาก Google Sheet */

async function loadMatches(){

try{

let res = await fetch(SHEET_CSV_URL)

let text = await res.text()

let rows = text.trim().split("\n")

rows.shift() // ลบ header

rows.forEach(r=>{

let c = r.split(",")

if(c.length < 5) return

matches.push({
blue1: c[0].trim(),
blue2: c[1].trim(),
red1: c[2].trim(),
red2: c[3].trim(),
date: c[4].trim()
})

})

/* สร้างรายชื่อผู้เล่น */

matches.forEach(m=>{
bluePlayers.add(m.blue1)
bluePlayers.add(m.blue2)
redPlayers.add(m.red1)
redPlayers.add(m.red2)
})

initSystem()

}catch(e){

document.getElementById("calendar").innerHTML =
"โหลดข้อมูลไม่สำเร็จ"

console.error(e)

}

}


/* PLAYER COLOR */

function playerName(name){

if(bluePlayers.has(name)){
return `<span style="color:#1565c0;font-weight:600">${name}</span>`
}

if(redPlayers.has(name)){
return `<span style="color:#c40404;font-weight:600">${name}</span>`
}

return name

}


/* DATE */

function parseDate(value){

let p=value.split("/")

return new Date(p[2],p[1]-1,p[0])

}

function formatDate(d){

let day=("0"+d.getDate()).slice(-2)
let month=("0"+(d.getMonth()+1)).slice(-2)
let year=d.getFullYear()

return `${day}/${month}/${year}`

}


/* DROPDOWN */

function buildPlayers(){

let select=document.getElementById("playerSelect")

select.innerHTML=""

let blueGroup=document.createElement("optgroup")
blueGroup.label="🔵 ทีมดำ-น้ำเงิน"

bluePlayers.forEach(p=>{
let opt=document.createElement("option")
opt.value=p
opt.text=p
blueGroup.appendChild(opt)
})

let redGroup=document.createElement("optgroup")
redGroup.label="🔴 ทีมขาว-แดง"

redPlayers.forEach(p=>{
let opt=document.createElement("option")
opt.value=p
opt.text=p
redGroup.appendChild(opt)
})

select.appendChild(blueGroup)
select.appendChild(redGroup)

select.addEventListener("change", searchPlayer)

}


/* PLAYER MATCHES */

function searchPlayer(){

let name=document.getElementById("playerSelect").value

let div=document.getElementById("playerMatches")

div.innerHTML=""

let list=[]

matches.forEach(m=>{

let d=parseDate(m.date)

if(m.blue1==name || m.blue2==name){

let partner=(m.blue1==name)?m.blue2:m.blue1

list.push({
date:d,
text:`${formatDate(d)} — ${playerName(name)} / ${playerName(partner)} vs ${playerName(m.red1)} / ${playerName(m.red2)}`
})

}

if(m.red1==name || m.red2==name){

let partner=(m.red1==name)?m.red2:m.red1

list.push({
date:d,
text:`${formatDate(d)} — ${playerName(name)} / ${playerName(partner)} vs ${playerName(m.blue1)} / ${playerName(m.blue2)}`
})

}

})

list.sort((a,b)=>a.date-b.date)

list.forEach(m=>{
let block=document.createElement("div")
block.className="match"
block.innerHTML=m.text
div.appendChild(block)
})

}


/* CALENDAR */

function buildCalendar(){

let calendar=document.getElementById("calendar")

calendar.innerHTML=""

let uniqueDates=[...new Set(matches.map(m=>m.date))]

uniqueDates.sort((a,b)=>parseDate(a)-parseDate(b))

uniqueDates.forEach(dateStr=>{

let d=parseDate(dateStr)

let div=document.createElement("div")

div.className="calendar-day"

div.innerText=formatDate(d)

div.onclick=function(){
showDailyMatches(dateStr)
}

calendar.appendChild(div)

})

}


/* DAILY MATCH */

function showDailyMatches(date){

let div=document.getElementById("dailyMatches")

let title=document.getElementById("dailyTitle")

div.innerHTML=""

title.innerText="🏸 แมตช์ของวันที่ "+date

matches.forEach(m=>{

if(m.date==date){

let block=document.createElement("div")

block.className="match"

block.innerHTML=`
${playerName(m.blue1)} / ${playerName(m.blue2)}
 vs 
${playerName(m.red1)} / ${playerName(m.red2)}
`

div.appendChild(block)

}

})

document.getElementById("dailyTitle").scrollIntoView({
behavior:"smooth"
})

}


/* INIT */

function initSystem(){

buildPlayers()

buildCalendar()

}


/* START */

loadMatches()

</script>

</body>
</html>
